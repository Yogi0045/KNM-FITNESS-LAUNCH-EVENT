{% extends "base.html" %}
{% block extra_head %}
<script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
{% endblock %}

{% block content %}
<section class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-10 sm:py-12">
  <h1 class="font-display text-3xl font-bold mb-2 text-center">QR <span class="gold-text">Check-In</span></h1>
  <p class="text-gray-400 text-center mb-8">Scan a participant's QR code or enter their Registration ID manually.</p>

  <div class="bg-white/5 border border-white/10 rounded-2xl p-6 mb-6">
    <div id="qr-reader" class="rounded-xl overflow-hidden"></div>
    <div class="flex gap-2 mt-4">
      <button id="start-scan" class="flex-1 bg-gold-500/10 border border-gold-500 text-gold-400 py-2.5 rounded-lg hover:bg-gold-500 hover:text-black transition text-sm font-semibold">
        Start Camera
      </button>
      <button id="stop-scan" class="flex-1 bg-white/5 border border-white/20 text-gray-300 py-2.5 rounded-lg hover:bg-white/10 transition text-sm font-semibold" disabled>
        Stop Camera
      </button>
    </div>
  </div>

  <div class="bg-white/5 border border-white/10 rounded-2xl p-6 mb-6">
    <label class="block text-sm font-medium mb-1.5">Or Enter Registration ID Manually</label>
    <div class="flex gap-2">
      <input id="manual-reg-id" type="text" placeholder="KNM-00001"
        class="flex-1 bg-black border border-white/20 rounded-lg px-4 py-2.5 focus:outline-none focus:border-gold-500 transition">
      <button id="manual-lookup" class="bg-gold-500/10 border border-gold-500 text-gold-400 px-5 rounded-lg hover:bg-gold-500 hover:text-black transition text-sm font-semibold">
        Lookup
      </button>
    </div>
  </div>

  <div id="result-card" class="hidden bg-white/5 border border-gold-500/30 rounded-2xl p-6"></div>
  <div id="status-message" class="mt-4 text-center text-sm"></div>
</section>
{% endblock %}

{% block extra_scripts %}
<script src="/static/js/checkin.js"></script>
{% endblock %}
